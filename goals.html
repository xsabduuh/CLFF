<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:        #0c0c0f;
–surface:   #111115;
–surface2:  #18181e;
–surface3:  #1f1f27;
–border:    rgba(255,255,255,0.06);
–border2:   rgba(255,255,255,0.10);
–text:      #e8e8f0;
–muted:     #6b6b80;
–muted2:    #9090a8;
–accent:    #7c6aff;
–accent2:   #5e4de8;
–green:     #34d399;
–amber:     #fbbf24;
–red:       #f87171;
–blue:      #60a5fa;
–sidebar-w: 240px;
–topbar-h:  64px;
–radius:    12px;
–radius-sm: 8px;
–t:         0.18s cubic-bezier(.4,0,.2,1);
}

html { font-size: 15px; }
body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
overflow-x: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
width: var(–sidebar-w);
background: var(–surface);
border-right: 1px solid var(–border);
display: flex; flex-direction: column;
position: fixed; top: 0; left: 0;
height: 100vh; z-index: 100;
transition: transform var(–t);
}
.sidebar-logo {
display: flex; align-items: center; gap: 10px;
padding: 22px 20px 18px;
border-bottom: 1px solid var(–border);
text-decoration: none;
}
.logo-icon {
width: 32px; height: 32px; background: var(–accent);
border-radius: 8px; display: grid; place-items: center;
font-size: 14px; color: #fff; flex-shrink: 0;
}
.logo-text { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; color: var(–text); }
.logo-text span { color: var(–accent); }
.sidebar-section {
padding: 14px 12px 4px; font-size: 0.68rem; font-weight: 600;
text-transform: uppercase; letter-spacing: 1px; color: var(–muted);
}
nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
nav::-webkit-scrollbar { width: 4px; }
nav::-webkit-scrollbar-thumb { background: var(–surface3); border-radius: 4px; }
.nav-item {
display: flex; align-items: center; gap: 10px;
padding: 9px 12px; border-radius: var(–radius-sm);
color: var(–muted2); text-decoration: none;
font-size: 0.9rem; font-weight: 400;
transition: background var(–t), color var(–t);
margin-bottom: 2px; position: relative;
}
.nav-item i { width: 16px; text-align: center; font-size: 0.85rem; flex-shrink: 0; }
.nav-item:hover { background: var(–surface2); color: var(–text); }
.nav-item.active { background: rgba(124,106,255,0.12); color: var(–accent); font-weight: 500; }
.nav-item.active::before {
content: ‘’; position: absolute; left: -12px;
top: 50%; transform: translateY(-50%);
width: 3px; height: 60%; background: var(–accent);
border-radius: 0 3px 3px 0;
}
.sidebar-footer { border-top: 1px solid var(–border); padding: 14px 12px; }
.user-card {
display: flex; align-items: center; gap: 10px;
padding: 8px 10px; border-radius: var(–radius-sm);
cursor: pointer; transition: background var(–t);
}
.user-card:hover { background: var(–surface2); }
.avatar {
width: 34px; height: 34px; border-radius: 50%;
background: linear-gradient(135deg, var(–accent), #a78bfa);
display: grid; place-items: center;
font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 0.85rem; font-weight: 500; color: var(–text); }
.user-role { font-size: 0.72rem; color: var(–muted); }
.overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.6); z-index: 99;
backdrop-filter: blur(2px);
}
.overlay.show { display: block; }

/* ── MAIN ── */
.main { margin-left: var(–sidebar-w); flex: 1; display: flex; flex-direction: column; }

/* ── TOPBAR ── */
.topbar {
height: var(–topbar-h); border-bottom: 1px solid var(–border);
display: flex; align-items: center;
padding: 0 28px; gap: 16px;
position: sticky; top: 0; z-index: 50;
background: rgba(12,12,15,0.88); backdrop-filter: blur(16px);
}
.menu-btn {
display: none; background: none; border: none;
color: var(–muted2); font-size: 1.1rem; cursor: pointer;
padding: 6px; border-radius: 6px;
transition: color var(–t), background var(–t);
}
.menu-btn:hover { color: var(–text); background: var(–surface2); }
.topbar-title { font-size: 1.05rem; font-weight: 600; color: var(–text); }
.topbar-avatar {
margin-left: auto;
width: 36px; height: 36px; border-radius: 50%;
background: linear-gradient(135deg, var(–accent), #a78bfa);
display: grid; place-items: center;
font-size: 0.78rem; font-weight: 700; color: #fff;
cursor: pointer; border: 2px solid transparent;
transition: border-color var(–t);
}
.topbar-avatar:hover { border-color: var(–accent); }

/* ── CONTENT ── */
.content { flex: 1; padding: 28px; max-width: 900px; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 4px; }
.page-header p { font-size: 0.85rem; color: var(–muted2); }
.stat-chips { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.chip {
display: flex; align-items: center; gap: 6px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 999px; padding: 4px 12px;
font-size: 0.75rem; color: var(–muted2);
font-family: ‘DM Mono’, monospace;
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── ADD GOAL ── */
.add-box { display: flex; gap: 10px; margin-bottom: 28px; }
.add-input {
flex: 1; background: var(–surface);
border: 1px solid var(–border2); border-radius: var(–radius-sm);
padding: 11px 16px; color: var(–text);
font-family: inherit; font-size: 0.9rem; outline: none;
transition: border-color var(–t), box-shadow var(–t);
}
.add-input::placeholder { color: var(–muted); }
.add-input:focus { border-color: var(–accent); box-shadow: 0 0 0 3px rgba(124,106,255,0.12); }
.add-input.error { border-color: var(–red); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
.add-btn {
display: flex; align-items: center; gap: 7px;
padding: 11px 18px; background: var(–accent); color: #fff;
border: none; border-radius: var(–radius-sm);
font-family: inherit; font-size: 0.88rem; font-weight: 500;
cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: background var(–t), transform var(–t), box-shadow var(–t);
}
.add-btn:hover { background: var(–accent2); box-shadow: 0 4px 16px rgba(124,106,255,0.3); }
.add-btn:active { transform: scale(0.97); }

/* ── OVERVIEW STRIP ── */
.overview-strip {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px;
margin-bottom: 28px;
}
.ov-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 16px 18px;
display: flex; align-items: center; gap: 12px;
transition: border-color var(–t);
}
.ov-card:hover { border-color: var(–border2); }
.ov-icon {
width: 38px; height: 38px; border-radius: 10px;
display: grid; place-items: center; font-size: 0.9rem; flex-shrink: 0;
}
.ov-label { font-size: 0.72rem; color: var(–muted2); margin-bottom: 2px; }
.ov-value { font-size: 1.15rem; font-weight: 600; font-family: ‘DM Mono’, monospace; color: var(–text); }

/* ── GOALS GRID ── */
.goals-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 14px;
}

/* ── GOAL CARD ── */
.goal-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 20px;
display: flex; flex-direction: column; gap: 16px;
transition: border-color var(–t), transform var(–t), box-shadow var(–t);
animation: slideUp 0.22s var(–t) both;
position: relative; overflow: hidden;
}
@keyframes slideUp {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}
.goal-card:hover { border-color: var(–border2); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
.goal-card.complete { border-color: rgba(52,211,153,0.3); }
.goal-card.complete::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, var(–green), #6ee7b7);
}
.goal-card.removing { animation: shrink 0.2s var(–t) forwards; }
@keyframes shrink { to { opacity: 0; transform: scale(0.95); } }

/* Card top */
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.goal-icon-wrap {
width: 36px; height: 36px; border-radius: 9px;
display: grid; place-items: center; font-size: 0.85rem; flex-shrink: 0;
}
.goal-title { flex: 1; font-size: 0.95rem; font-weight: 500; color: var(–text); line-height: 1.35; word-break: break-word; }
.del-btn {
width: 28px; height: 28px; background: none;
border: 1px solid transparent; border-radius: 6px;
color: var(–muted); font-size: 0.75rem; cursor: pointer;
display: grid; place-items: center; flex-shrink: 0;
transition: background var(–t), border-color var(–t), color var(–t);
}
.del-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); color: var(–red); }

/* Progress section */
.progress-section { display: flex; flex-direction: column; gap: 8px; }
.progress-row { display: flex; align-items: center; justify-content: space-between; }
.progress-label { font-size: 0.75rem; color: var(–muted2); }
.progress-pct {
font-size: 1rem; font-weight: 600;
font-family: ‘DM Mono’, monospace;
transition: color var(–t);
}
.progress-track {
height: 7px; background: var(–surface3);
border-radius: 999px; overflow: hidden;
}
.progress-fill {
height: 100%; border-radius: 999px;
transition: width 0.4s cubic-bezier(.4,0,.2,1), background 0.4s;
}

/* Controls */
.card-controls { display: flex; gap: 8px; align-items: center; }
.ctrl-btn {
width: 34px; height: 34px;
background: var(–surface2); border: 1px solid var(–border2);
border-radius: var(–radius-sm); color: var(–muted2);
font-size: 0.8rem; cursor: pointer; display: grid; place-items: center;
transition: background var(–t), border-color var(–t), color var(–t), transform var(–t);
flex-shrink: 0;
}
.ctrl-btn:hover:not(:disabled) { background: var(–surface3); border-color: var(–border2); color: var(–text); }
.ctrl-btn:active:not(:disabled) { transform: scale(0.92); }
.ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-btn.plus:hover:not(:disabled) { background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); color: var(–green); }
.ctrl-btn.minus:hover:not(:disabled) { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.2); color: var(–red); }

.ctrl-info { flex: 1; text-align: center; }
.ctrl-step { font-size: 0.68rem; color: var(–muted); }

.status-badge {
margin-left: auto;
display: flex; align-items: center; gap: 5px;
font-size: 0.72rem; font-weight: 600; padding: 3px 10px;
border-radius: 999px;
}
.status-badge.todo     { background: var(–surface2); color: var(–muted); border: 1px solid var(–border); }
.status-badge.progress { background: rgba(96,165,250,0.1); color: var(–blue); border: 1px solid rgba(96,165,250,0.2); }
.status-badge.almost   { background: rgba(251,191,36,0.1); color: var(–amber); border: 1px solid rgba(251,191,36,0.2); }
.status-badge.done     { background: rgba(52,211,153,0.1); color: var(–green); border: 1px solid rgba(52,211,153,0.2); }

/* ── EMPTY STATE ── */
.empty-state {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 72px 20px; text-align: center; gap: 12px;
grid-column: 1 / -1;
}
.empty-icon {
width: 64px; height: 64px; background: var(–surface2);
border: 1px solid var(–border); border-radius: 16px;
display: grid; place-items: center;
font-size: 1.4rem; color: var(–muted); margin-bottom: 4px;
}
.empty-state h3 { font-size: 1rem; font-weight: 600; }
.empty-state p { font-size: 0.83rem; color: var(–muted); max-width: 260px; line-height: 1.5; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
.sidebar { transform: translateX(-100%); }
.sidebar.open { transform: translateX(0); box-shadow: 24px 0 60px rgba(0,0,0,0.5); }
.main { margin-left: 0; }
.menu-btn { display: grid; }
.overview-strip { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
.content { padding: 16px; }
.topbar { padding: 0 16px; }
.add-box { flex-direction: column; }
.add-btn { justify-content: center; }
.overview-strip { grid-template-columns: 1fr; }
.goals-grid { grid-template-columns: 1fr; }
}
</style>

</head>

    <!-- Header -->

      <h1>My Goals</h1>
      <p>Track your long-term ambitions and watch them grow.</p>
      <div class="stat-chips">
        <div class="chip"><span class="dot" style="background:var(--accent)"></span><span id="chipTotal">0 goals</span></div>
        <div class="chip"><span class="dot" style="background:var(--green)"></span><span id="chipDone">0 completed</span></div>
        <div class="chip"><span class="dot" style="background:var(--blue)"></span><span id="chipAvg">Avg: 0%</span></div>
      </div>

<!-- Add -->
<div class="add-box">
  <input type="text" class="add-input" id="goalInput" placeholder="What's your next goal? (e.g. Learn Spanish)" maxlength="120">

  </button>

<!-- Overview strip -->

  </div>

      <i class="fa-solid fa-trophy"></i>
    </div>
    <div>
      <div class="ov-label">Completed</div>

    </div>
  </div>

      <i class="fa-solid fa-chart-line"></i>

</div>

<!-- Goals grid -->

<script>
  // ── CONSTANTS ──
  const STORAGE_KEY = 'lifeos_goals';

  const PALETTES = [
    { bg: 'rgba(124,106,255,0.12)', color: '#7c6aff', grad: 'linear-gradient(90deg,#7c6aff,#a78bfa)' },
    { bg: 'rgba(52,211,153,0.12)',  color: '#34d399', grad: 'linear-gradient(90deg,#34d399,#6ee7b7)' },
    { bg: 'rgba(96,165,250,0.12)',  color: '#60a5fa', grad: 'linear-gradient(90deg,#60a5fa,#93c5fd)' },
    { bg: 'rgba(251,191,36,0.12)',  color: '#fbbf24', grad: 'linear-gradient(90deg,#fbbf24,#fde68a)' },
    { bg: 'rgba(248,113,113,0.12)', color: '#f87171', grad: 'linear-gradient(90deg,#f87171,#fca5a5)' },
    { bg: 'rgba(167,139,250,0.12)', color: '#a78bfa', grad: 'linear-gradient(90deg,#a78bfa,#c4b5fd)' },
    { bg: 'rgba(251,146,60,0.12)',  color: '#fb923c', grad: 'linear-gradient(90deg,#fb923c,#fdba74)' },
    { bg: 'rgba(56,189,248,0.12)',  color: '#38bdf8', grad: 'linear-gradient(90deg,#38bdf8,#7dd3fc)' },
  ];

  const ICONS = [
    'fa-star','fa-rocket','fa-dumbbell','fa-book','fa-heart',
    'fa-code','fa-piggy-bank','fa-globe','fa-graduation-cap','fa-briefcase'
  ];

  // ── STATE ──
  let goals = [];

  // ── LOAD / SAVE ──
  function loadGoals() {
    try { goals = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { goals = []; }
  }
  function saveGoals() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
  }

  // ── HELPERS ──
  function getStatus(p) {
    if (p === 0)          return { key: 'todo',     label: 'Not started', icon: 'fa-circle' };
    if (p < 50)           return { key: 'progress', label: 'In progress', icon: 'fa-spinner' };
    if (p < 100)          return { key: 'almost',   label: 'Almost there', icon: 'fa-bolt' };
    return                       { key: 'done',     label: 'Completed!', icon: 'fa-trophy' };
  }

  function getPctColor(p) {
    if (p === 0)   return 'var(--muted2)';
    if (p < 50)    return 'var(--blue)';
    if (p < 100)   return 'var(--amber)';
    return 'var(--green)';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ADD GOAL ──
  function addGoal() {
    const input = document.getElementById('goalInput');
    const title = input.value.trim();
    if (!title) {
      input.classList.add('error');
      input.focus();
      setTimeout(() => input.classList.remove('error'), 700);
      return;
    }
    const idx     = goals.length % PALETTES.length;
    const iconIdx = goals.length % ICONS.length;
    const goal    = {
      id: Date.now(),
      title,
      progress: 0,
      paletteIdx: idx,
      iconIdx,
      createdAt: Date.now()
    };
    goals.unshift(goal);
    saveGoals();
    input.value = '';
    renderGoals();
  }

  // ── DELETE GOAL ──
  function deleteGoal(id) {
    const card = document.querySelector(`.goal-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        goals = goals.filter(g => g.id !== id);
        saveGoals();
        renderGoals();
      }, 200);
    }
  }

  // ── INCREASE PROGRESS ──
  function increaseProgress(id) {
    const g = goals.find(g => g.id === id);
    if (!g) return;
    g.progress = Math.min(100, g.progress + 10);
    saveGoals();
    updateCard(id);
    updateStats();
  }

  // ── DECREASE PROGRESS ──
  function decreaseProgress(id) {
    const g = goals.find(g => g.id === id);
    if (!g) return;
    g.progress = Math.max(0, g.progress - 10);
    saveGoals();
    updateCard(id);
    updateStats();
  }

  // ── UPDATE A SINGLE CARD (no full re-render) ──
  function updateCard(id) {
    const g    = goals.find(g => g.id === id);
    if (!g) return;
    const card = document.querySelector(`.goal-card[data-id="${id}"]`);
    if (!card) return;
    const p       = g.progress;
    const pal     = PALETTES[g.paletteIdx % PALETTES.length];
    const status  = getStatus(p);

    // progress fill + pct
    card.querySelector('.progress-fill').style.width      = p + '%';
    card.querySelector('.progress-fill').style.background = pal.grad;
    card.querySelector('.progress-pct').textContent       = p + '%';
    card.querySelector('.progress-pct').style.color       = getPctColor(p);

    // status badge
    const badge = card.querySelector('.status-badge');
    badge.className = `status-badge ${status.key}`;
    badge.innerHTML = `<i class="fa-solid ${status.icon}"></i> ${status.label}`;

    // buttons state
    card.querySelector('.ctrl-btn.minus').disabled = p <= 0;
    card.querySelector('.ctrl-btn.plus').disabled  = p >= 100;

    // complete styling
    card.classList.toggle('complete', p === 100);
  }

  // ── UPDATE STATS ONLY ──
  function updateStats() {
    const total = goals.length;
    const done  = goals.filter(g => g.progress === 100).length;
    const avg   = total > 0 ? Math.round(goals.reduce((s,g) => s + g.progress, 0) / total) : 0;

    document.getElementById('chipTotal').textContent = `${total} goal${total !== 1 ? 's' : ''}`;
    document.getElementById('chipDone').textContent  = `${done} completed`;
    document.getElementById('chipAvg').textContent   = `Avg: ${avg}%`;

    const strip = document.getElementById('overviewStrip');
    strip.style.display = total > 0 ? 'grid' : 'none';
    if (total > 0) {
      document.getElementById('ovTotal').textContent = total;
      document.getElementById('ovDone').textContent  = done;
      document.getElementById('ovAvg').textContent   = avg + '%';
    }
  }

  // ── RENDER ALL ──
  function renderGoals() {
    const grid  = document.getElementById('goalsGrid');
    updateStats();

    if (goals.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="fa-solid fa-bullseye"></i></div>
          <h3>No goals yet</h3>
          <p>Add your first goal above and start tracking your progress toward it.</p>
        </div>`;
      return;
    }

    grid.innerHTML = goals.map(g => {
      const p      = g.progress;
      const pal    = PALETTES[g.paletteIdx % PALETTES.length];
      const icon   = ICONS[g.iconIdx % ICONS.length];
      const status = getStatus(p);

      return `
        <div class="goal-card ${p === 100 ? 'complete' : ''}" data-id="${g.id}">

          <div class="card-top">
            <div class="goal-icon-wrap" style="background:${pal.bg}; color:${pal.color}">
              <i class="fa-solid ${icon}"></i>
            </div>
            <span class="goal-title">${escHtml(g.title)}</span>
            <button class="del-btn" onclick="deleteGoal(${g.id})" title="Delete goal">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>

          <div class="progress-section">
            <div class="progress-row">
              <span class="progress-label">Progress</span>
              <span class="progress-pct" style="color:${getPctColor(p)}">${p}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${p}%; background:${pal.grad}"></div>
            </div>
          </div>

          <div class="card-controls">
            <button class="ctrl-btn minus" onclick="decreaseProgress(${g.id})" title="−10%" ${p <= 0 ? 'disabled' : ''}>
              <i class="fa-solid fa-minus"></i>
            </button>
            <div class="ctrl-info">
              <div class="ctrl-step">±10% per step</div>
            </div>
            <button class="ctrl-btn plus" onclick="increaseProgress(${g.id})" title="+10%" ${p >= 100 ? 'disabled' : ''}>
              <i class="fa-solid fa-plus"></i>
            </button>
            <div class="status-badge ${status.key}">
              <i class="fa-solid ${status.icon}"></i> ${status.label}
            </div>
          </div>

        </div>`;
    }).join('');
  }

  // ── ENTER KEY ──
  document.getElementById('goalInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addGoal();
  });

  // ── SIDEBAR ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // ── INIT ──
  loadGoals();
  renderGoals();
</script>

</body>
</html>
