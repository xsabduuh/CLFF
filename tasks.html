<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS — المهام</title>
  <!-- الخطوط والأيقونات -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== إعدادات أساسية (زجاجية) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --glass-bg: rgba(18, 18, 26, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.5);
      --text: #f0f0fc;
      --muted: #8888aa;
      --accent: #a277ff;
      --green: #2ecc71;
      --amber: #f1c40f;
      --red: #e74c3c;
      --blue: #3498db;
      --purple: #9b59b6;
      --sidebar-w: 260px;
      --topbar-h: 70px;
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
      background-image: radial-gradient(circle at 20% 30%, rgba(162, 119, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(52, 152, 219, 0.06) 0%, transparent 50%);
    }

    /* ===== شريط جانبي (زجاجي) ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      z-index: 100;
      transition: var(--transition);
      box-shadow: var(--glass-shadow);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--glass-border);
      text-decoration: none;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), #d09eff);
      border-radius: 18px 6px 18px 6px;
      display: grid; place-items: center;
      font-size: 18px; color: #fff;
      box-shadow: 0 8px 20px rgba(162,119,255,0.5);
    }
    .logo-text { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .logo-text span { color: var(--accent); }

    .sidebar-section {
      padding: 20px 24px 8px;
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted);
    }
    nav { flex: 1; overflow-y: auto; padding: 8px 16px; }
    nav::-webkit-scrollbar { width: 4px; }
    nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 18px; border-radius: 20px 8px 20px 8px;
      color: var(--muted); text-decoration: none;
      font-size: 0.95rem; font-weight: 400;
      transition: var(--transition); margin-bottom: 6px;
      backdrop-filter: blur(5px);
    }
    .nav-item i { width: 22px; text-align: center; font-size: 1.1rem; }
    .nav-item:hover { background: rgba(162, 119, 255, 0.12); color: var(--text); }
    .nav-item.active {
      background: rgba(162, 119, 255, 0.2);
      color: var(--accent); font-weight: 500;
      box-shadow: 0 4px 15px rgba(162, 119, 255, 0.2);
    }
    .nav-badge {
      margin-right: auto; background: var(--accent); color: #fff;
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 30px;
    }

    .sidebar-footer { border-top: 1px solid var(--glass-border); padding: 20px 20px; }
    .user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 20px;
      cursor: pointer; transition: var(--transition);
      background: rgba(255,255,255,0.02);
    }
    .user-card:hover { background: rgba(255,255,255,0.06); }
    .avatar {
      width: 42px; height: 42px; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid; place-items: center;
      font-size: 0.9rem; font-weight: 700; color: #fff;
    }
    .user-name { font-size: 0.9rem; font-weight: 500; }
    .user-role { font-size: 0.7rem; color: var(--muted); }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 99;
    }
    .overlay.show { display: block; }

    /* ===== المحتوى الرئيسي ===== */
    .main {
      margin-right: var(--sidebar-w);
      flex: 1; display: flex; flex-direction: column;
      min-height: 100vh;
    }

    /* ===== الشريط العلوي (زجاجي) ===== */
    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center;
      padding: 0 32px; gap: 20px;
      background: var(--glass-bg); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 50;
    }
    .menu-btn {
      display: none; background: none; border: none;
      color: var(--muted); font-size: 1.3rem; cursor: pointer;
      padding: 8px; border-radius: 12px;
    }
    .menu-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    .topbar-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
    .topbar-date {
      font-size: 0.8rem; color: var(--muted); margin-right: 6px;
    }

    .search-bar {
      margin-right: auto;
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 40px; padding: 10px 20px;
      width: 260px; backdrop-filter: blur(10px);
    }
    .search-bar i { color: var(--muted); }
    .search-bar input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 0.9rem; width: 100%;
    }

    .topbar-actions { display: flex; align-items: center; gap: 16px; }
    .notif-btn {
      position: relative; width: 44px; height: 44px;
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 16px; display: grid; place-items: center;
      cursor: pointer; color: var(--muted); font-size: 1rem;
      backdrop-filter: blur(10px);
    }
    .notif-btn:hover { color: var(--text); }
    .notif-dot {
      position: absolute; top: 10px; right: 10px;
      width: 8px; height: 8px; background: var(--accent);
      border-radius: 50%; border: 2px solid var(--bg);
    }
    .topbar-avatar {
      width: 44px; height: 44px; border-radius: 30% 70% 50% 50% / 30% 40% 60% 70%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid; place-items: center;
      font-weight: 700; color: #fff; cursor: pointer;
    }

    /* ===== منطقة المحتوى ===== */
    .content { flex: 1; padding: 30px 32px; max-width: 1000px; }

    /* ===== رأس الصفحة ===== */
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p { color: var(--muted); margin-top: 6px; }

    /* ===== شريحة إحصاءات سريعة ===== */
    .stats-mini {
      display: flex; gap: 16px; margin-bottom: 24px;
    }
    .stat-chip {
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: 40px;
      padding: 8px 18px; display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem;
    }
    .stat-chip i { color: var(--accent); }

    /* ===== إضافة مهمة ===== */
    .add-box {
      display: flex; gap: 12px; margin-bottom: 30px;
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      padding: 20px; box-shadow: var(--glass-shadow);
    }
    .add-input {
      flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 40px; padding: 14px 20px; color: var(--text);
      font-family: inherit; font-size: 0.95rem; outline: none;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-btn {
      padding: 14px 28px; background: var(--accent); color: #fff;
      border: none; border-radius: 40px; font-family: inherit;
      font-size: 0.95rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: var(--transition); box-shadow: 0 8px 20px rgba(162,119,255,0.3);
    }
    .add-btn:hover { background: #b088ff; transform: translateY(-2px); }

    /* ===== أزرار التصفية ===== */
    .filters { display: flex; gap: 10px; margin-bottom: 24px; }
    .filter-btn {
      padding: 10px 24px; background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 40px; color: var(--muted); font-family: inherit;
      font-size: 0.9rem; cursor: pointer; backdrop-filter: blur(5px);
      transition: var(--transition);
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ===== قائمة المهام ===== */
    .tasks-list {
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      padding: 8px; box-shadow: var(--glass-shadow);
    }
    .task-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; border-bottom: 1px solid var(--glass-border);
      transition: var(--transition);
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: rgba(255,255,255,0.02); }
    .task-check {
      width: 24px; height: 24px; border: 2px solid var(--muted);
      border-radius: 8px 2px 8px 2px; cursor: pointer;
      display: grid; place-items: center; color: transparent;
      transition: var(--transition);
    }
    .task-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
    .task-text { flex: 1; font-size: 1rem; }
    .task-text.done { color: var(--muted); text-decoration: line-through; }
    .task-time { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    .del-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1rem; cursor: pointer; padding: 8px;
      border-radius: 12px; transition: var(--transition);
    }
    .del-btn:hover { color: var(--red); background: rgba(231,76,60,0.1); }

    .empty-state {
      text-align: center; padding: 48px; color: var(--muted);
    }

    /* ===== تجاوب ===== */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-right: 0; }
      .menu-btn { display: grid; }
      .search-bar { display: none; }
    }
    @media (max-width: 600px) {
      .content { padding: 20px 16px; }
      .add-box { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
    <span class="logo-text">Life<span>OS</span></span>
  </a>
  <nav>
    <div class="sidebar-section">الرئيسية</div>
    <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> لوحة التحكم</a>
    <a href="tasks.html" class="nav-item active"><i class="fa-solid fa-circle-check"></i> المهام <span class="nav-badge" id="pendingTasksBadge">0</span></a>
    <a href="habits.html" class="nav-item"><i class="fa-solid fa-fire-flame-curved"></i> العادات</a>
    <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> الأهداف</a>
    <a href="calendar.html" class="nav-item"><i class="fa-regular fa-calendar"></i> التقويم</a>
    <div class="sidebar-section" style="margin-top:8px">أدوات</div>
    <a href="finance.html" class="nav-item"><i class="fa-solid fa-wallet"></i> المالية</a>
    <a href="notes.html" class="nav-item"><i class="fa-regular fa-note-sticky"></i> الملاحظات</a>
    <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar" id="sidebarAvatar">AO</div>
      <div style="flex:1">
        <div class="user-name" id="sidebarUserName">أيت عمر</div>
        <div class="user-role">خطة مجانية</div>
      </div>
    </div>
  </div>
</aside>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div>
      <div class="topbar-title">المهام</div>
      <div class="topbar-date" id="todayDate"></div>
    </div>
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="ابحث في المهام..." oninput="onSearch(this.value)">
    </div>
    <div class="topbar-actions">
      <div class="notif-btn" id="notificationBell"><i class="fa-regular fa-bell"></i><span class="notif-dot"></span></div>
      <div class="topbar-avatar" id="topbarAvatar">AO</div>
    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <h1>مهامي</h1>
      <p>أدر مهامك اليومية وحافظ على إنتاجيتك.</p>
    </div>

    <!-- إحصائيات سريعة -->
    <div class="stats-mini">
      <div class="stat-chip"><i class="fa-solid fa-list-check"></i> <span id="totalTasksCount">0</span> إجمالي</div>
      <div class="stat-chip"><i class="fa-regular fa-circle-check"></i> <span id="completedTasksCount">0</span> مكتملة</div>
      <div class="stat-chip"><i class="fa-regular fa-clock"></i> <span id="pendingTasksCount">0</span> متبقية</div>
    </div>

    <div class="add-box">
      <input type="text" class="add-input" id="taskInput" placeholder="أضف مهمة جديدة..." maxlength="200">
      <button class="add-btn" onclick="addTask()"><i class="fa-solid fa-plus"></i> إضافة</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="filterTasks('all')">الكل</button>
      <button class="filter-btn" data-filter="active" onclick="filterTasks('active')">النشطة</button>
      <button class="filter-btn" data-filter="completed" onclick="filterTasks('completed')">المكتملة</button>
    </div>

    <div class="tasks-list" id="tasksList"></div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- إعدادات المستخدم ----------
    const SETTINGS_KEY = 'lifeos_settings';
    let appSettings = {
      profile: { name: 'أيت عمر', email: '', avatarColor: 'default' },
      preferences: { language: 'ar', currency: 'MAD', dateFormat: 'ar-EG' },
      appearance: { accentColor: '#a277ff' },
      notifications: { enabled: true }
    };
    try {
      const stored = localStorage.getItem(SETTINGS_KEY);
      if (stored) appSettings = JSON.parse(stored);
    } catch(e) {}

    function applySettings() {
      document.documentElement.style.setProperty('--accent', appSettings.appearance.accentColor);
      const fullName = appSettings.profile.name;
      const firstName = fullName.split(' ')[0];
      document.getElementById('sidebarUserName').textContent = firstName;
      const initials = fullName.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() || 'AO';
      document.getElementById('sidebarAvatar').textContent = initials;
      document.getElementById('topbarAvatar').textContent = initials;
      window.dateLocale = appSettings.preferences.dateFormat || 'ar-EG';
      if (!appSettings.notifications.enabled) {
        document.getElementById('notificationBell').style.opacity = '0.5';
      }
    }
    applySettings();

    // تحديث التاريخ
    const now = new Date();
    document.getElementById('todayDate').textContent = now.toLocaleDateString(window.dateLocale, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // ---------- إدارة المهام ----------
    const STORAGE_KEY = 'lifeos_tasks';
    let tasks = [];
    let currentFilter = 'all';
    let searchQuery = '';

    function loadTasks() {
      try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; }
    }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function updateStats() {
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const pending = total - completed;
      document.getElementById('totalTasksCount').textContent = total;
      document.getElementById('completedTasksCount').textContent = completed;
      document.getElementById('pendingTasksCount').textContent = pending;
      document.getElementById('pendingTasksBadge').textContent = pending;
    }

    function renderTasks() {
      const container = document.getElementById('tasksList');
      let filtered = tasks;
      if (currentFilter === 'active') filtered = tasks.filter(t => !t.completed);
      else if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
      if (searchQuery) filtered = filtered.filter(t => t.text.toLowerCase().includes(searchQuery));

      updateStats();

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fa-regular fa-circle-check" style="font-size:2.5rem; opacity:0.5; margin-bottom:16px;"></i><p>لا توجد مهام</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(t => `
        <div class="task-item ${t.completed ? 'done' : ''}" data-id="${t.id}">
          <div class="task-check ${t.completed ? 'checked' : ''}" onclick="toggleTask(${t.id})"><i class="fa-solid fa-check"></i></div>
          <span class="task-text">${escapeHtml(t.text)}</span>
          <span class="task-time">${formatTime(t.createdAt)}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})"><i class="fa-solid fa-trash-can"></i></button>
        </div>
      `).join('');
    }

    window.addTask = function() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, completed: false, createdAt: Date.now() });
      saveTasks();
      input.value = '';
      if (currentFilter === 'completed') filterTasks('all');
      else renderTasks();
    };

    window.toggleTask = function(id) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.completed = !task.completed; saveTasks(); renderTasks(); }
    };

    window.deleteTask = function(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    };

    window.filterTasks = function(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === type));
      renderTasks();
    };

    window.onSearch = function(val) {
      searchQuery = val.toLowerCase();
      renderTasks();
    };

    document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    // Sidebar toggle
    window.toggleSidebar = () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    };
    window.closeSidebar = () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    };

    loadTasks();
    renderTasks();
  })();
</script>
</body>
</html>
