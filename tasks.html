<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS — Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:        #0c0c0f;
–surface:   #111115;
–surface2:  #18181e;
–surface3:  #1f1f27;
–border:    rgba(255,255,255,0.06);
–border2:   rgba(255,255,255,0.10);
–text:      #e8e8f0;
–muted:     #6b6b80;
–muted2:    #9090a8;
–accent:    #7c6aff;
–accent2:   #5e4de8;
–green:     #34d399;
–amber:     #fbbf24;
–red:       #f87171;
–blue:      #60a5fa;
–sidebar-w: 240px;
–topbar-h:  64px;
–radius:    12px;
–radius-sm: 8px;
–t:         0.18s cubic-bezier(.4,0,.2,1);
}

html { font-size: 15px; }
body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
display: flex;
overflow-x: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
width: var(–sidebar-w);
background: var(–surface);
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
position: fixed;
top: 0; left: 0;
height: 100vh;
z-index: 100;
transition: transform var(–t);
}
.sidebar-logo {
display: flex;
align-items: center;
gap: 10px;
padding: 22px 20px 18px;
border-bottom: 1px solid var(–border);
text-decoration: none;
}
.logo-icon {
width: 32px; height: 32px;
background: var(–accent);
border-radius: 8px;
display: grid; place-items: center;
font-size: 14px; color: #fff; flex-shrink: 0;
}
.logo-text { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; color: var(–text); }
.logo-text span { color: var(–accent); }

.sidebar-section {
padding: 14px 12px 4px;
font-size: 0.68rem; font-weight: 600;
text-transform: uppercase; letter-spacing: 1px;
color: var(–muted);
}
nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
nav::-webkit-scrollbar { width: 4px; }
nav::-webkit-scrollbar-thumb { background: var(–surface3); border-radius: 4px; }

.nav-item {
display: flex; align-items: center; gap: 10px;
padding: 9px 12px;
border-radius: var(–radius-sm);
color: var(–muted2);
text-decoration: none;
font-size: 0.9rem; font-weight: 400;
transition: background var(–t), color var(–t);
margin-bottom: 2px;
position: relative;
}
.nav-item i { width: 16px; text-align: center; font-size: 0.85rem; flex-shrink: 0; }
.nav-item:hover { background: var(–surface2); color: var(–text); }
.nav-item.active {
background: rgba(124,106,255,0.12);
color: var(–accent); font-weight: 500;
}
.nav-item.active::before {
content: ‘’;
position: absolute; left: -12px;
top: 50%; transform: translateY(-50%);
width: 3px; height: 60%;
background: var(–accent);
border-radius: 0 3px 3px 0;
}
.sidebar-footer { border-top: 1px solid var(–border); padding: 14px 12px; }
.user-card {
display: flex; align-items: center; gap: 10px;
padding: 8px 10px;
border-radius: var(–radius-sm);
cursor: pointer;
transition: background var(–t);
}
.user-card:hover { background: var(–surface2); }
.avatar {
width: 34px; height: 34px; border-radius: 50%;
background: linear-gradient(135deg, var(–accent), #a78bfa);
display: grid; place-items: center;
font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 0.85rem; font-weight: 500; color: var(–text); }
.user-role { font-size: 0.72rem; color: var(–muted); }

.overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.6); z-index: 99;
backdrop-filter: blur(2px);
}
.overlay.show { display: block; }

/* ── MAIN ── */
.main { margin-left: var(–sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
height: var(–topbar-h);
border-bottom: 1px solid var(–border);
display: flex; align-items: center;
padding: 0 28px; gap: 16px;
position: sticky; top: 0; z-index: 50;
background: rgba(12,12,15,0.88);
backdrop-filter: blur(16px);
}
.menu-btn {
display: none; background: none; border: none;
color: var(–muted2); font-size: 1.1rem; cursor: pointer;
padding: 6px; border-radius: 6px;
transition: color var(–t), background var(–t);
}
.menu-btn:hover { color: var(–text); background: var(–surface2); }
.topbar-title { font-size: 1.05rem; font-weight: 600; color: var(–text); }

.search-bar {
margin-left: auto;
display: flex; align-items: center; gap: 8px;
background: var(–surface2);
border: 1px solid var(–border2);
border-radius: var(–radius-sm);
padding: 8px 14px; width: 240px;
transition: border-color var(–t), width var(–t);
}
.search-bar:focus-within { border-color: var(–accent); width: 280px; }
.search-bar i { color: var(–muted); font-size: 0.8rem; flex-shrink: 0; }
.search-bar input {
background: none; border: none; outline: none;
color: var(–text); font-family: inherit;
font-size: 0.85rem; width: 100%;
}
.search-bar input::placeholder { color: var(–muted); }
.search-clear {
background: none; border: none; cursor: pointer;
color: var(–muted); font-size: 0.75rem;
padding: 2px; display: none;
transition: color var(–t);
}
.search-clear:hover { color: var(–text); }
.search-clear.visible { display: block; }

.topbar-avatar {
width: 36px; height: 36px; border-radius: 50%;
background: linear-gradient(135deg, var(–accent), #a78bfa);
display: grid; place-items: center;
font-size: 0.78rem; font-weight: 700; color: #fff;
cursor: pointer; flex-shrink: 0;
border: 2px solid transparent;
transition: border-color var(–t);
}
.topbar-avatar:hover { border-color: var(–accent); }

/* ── CONTENT ── */
.content { flex: 1; padding: 28px; max-width: 800px; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 24px; }
.page-header h1 {
font-size: 1.5rem; font-weight: 600;
letter-spacing: -0.4px; margin-bottom: 4px;
}
.page-header p { font-size: 0.85rem; color: var(–muted2); }
.stat-chips { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.chip {
display: flex; align-items: center; gap: 6px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 999px;
padding: 4px 12px;
font-size: 0.75rem; color: var(–muted2);
font-family: ‘DM Mono’, monospace;
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ── ADD TASK ── */
.add-box {
display: flex; gap: 10px;
margin-bottom: 20px;
}
.add-input {
flex: 1;
background: var(–surface);
border: 1px solid var(–border2);
border-radius: var(–radius-sm);
padding: 11px 16px;
color: var(–text);
font-family: inherit; font-size: 0.9rem;
outline: none;
transition: border-color var(–t), box-shadow var(–t);
}
.add-input::placeholder { color: var(–muted); }
.add-input:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
}
.add-btn {
display: flex; align-items: center; gap: 7px;
padding: 11px 18px;
background: var(–accent);
color: #fff;
border: none; border-radius: var(–radius-sm);
font-family: inherit; font-size: 0.88rem; font-weight: 500;
cursor: pointer;
transition: background var(–t), transform var(–t), box-shadow var(–t);
white-space: nowrap; flex-shrink: 0;
}
.add-btn:hover { background: var(–accent2); box-shadow: 0 4px 16px rgba(124,106,255,0.3); }
.add-btn:active { transform: scale(0.97); }

/* ── FILTERS ── */
.filters {
display: flex; gap: 6px;
margin-bottom: 20px; flex-wrap: wrap;
}
.filter-btn {
padding: 6px 16px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 999px;
color: var(–muted2);
font-family: inherit; font-size: 0.8rem; font-weight: 500;
cursor: pointer;
transition: background var(–t), color var(–t), border-color var(–t);
}
.filter-btn:hover { background: var(–surface3); color: var(–text); }
.filter-btn.active {
background: rgba(124,106,255,0.15);
border-color: rgba(124,106,255,0.4);
color: var(–accent);
}

/* ── TASK LIST ── */
.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-card {
display: flex; align-items: center; gap: 12px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px 16px;
transition: border-color var(–t), transform var(–t), opacity var(–t), box-shadow var(–t);
animation: slideIn 0.22s var(–t) both;
}
@keyframes slideIn {
from { opacity: 0; transform: translateY(-8px); }
to   { opacity: 1; transform: translateY(0); }
}
.task-card:hover {
border-color: var(–border2);
box-shadow: 0 4px 20px rgba(0,0,0,0.25);
transform: translateY(-1px);
}
.task-card.removing {
animation: slideOut 0.2s var(–t) forwards;
}
@keyframes slideOut {
to { opacity: 0; transform: translateX(20px); height: 0; padding: 0; margin: 0; border: none; }
}

/* Checkbox */
.cb {
width: 20px; height: 20px;
border: 1.5px solid var(–border2);
border-radius: 6px;
display: grid; place-items: center;
cursor: pointer; flex-shrink: 0;
font-size: 0.62rem; color: transparent;
transition: background var(–t), border-color var(–t), color var(–t);
}
.cb:hover { border-color: var(–accent); }
.cb.checked { background: var(–accent); border-color: var(–accent); color: #fff; }

.task-text {
flex: 1; font-size: 0.9rem; color: var(–text);
transition: color var(–t);
word-break: break-word;
line-height: 1.4;
}
.task-card.done .task-text {
color: var(–muted);
text-decoration: line-through;
}

.task-time {
font-size: 0.7rem;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
flex-shrink: 0;
white-space: nowrap;
}

.del-btn {
width: 30px; height: 30px;
background: none; border: 1px solid transparent;
border-radius: var(–radius-sm);
color: var(–muted);
font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
display: grid; place-items: center;
transition: background var(–t), border-color var(–t), color var(–t);
}
.del-btn:hover {
background: rgba(248,113,113,0.1);
border-color: rgba(248,113,113,0.25);
color: var(–red);
}

/* ── EMPTY STATE ── */
.empty-state {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 64px 20px; text-align: center;
gap: 12px;
}
.empty-icon {
width: 64px; height: 64px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 16px;
display: grid; place-items: center;
font-size: 1.4rem; color: var(–muted);
margin-bottom: 4px;
}
.empty-state h3 { font-size: 1rem; font-weight: 600; color: var(–text); }
.empty-state p { font-size: 0.83rem; color: var(–muted); max-width: 260px; line-height: 1.5; }

/* ── BULK ACTIONS ── */
.bulk-bar {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.tasks-count { font-size: 0.78rem; color: var(–muted2); }
.tasks-count strong { color: var(–text); font-family: ‘DM Mono’, monospace; }
.clear-completed {
background: none; border: none;
color: var(–muted); font-family: inherit; font-size: 0.78rem;
cursor: pointer; display: flex; align-items: center; gap: 5px;
transition: color var(–t);
padding: 4px 0;
}
.clear-completed:hover { color: var(–red); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
.sidebar { transform: translateX(-100%); }
.sidebar.open { transform: translateX(0); box-shadow: 24px 0 60px rgba(0,0,0,0.5); }
.main { margin-left: 0; }
.menu-btn { display: grid; }
.search-bar { width: 180px; }
.search-bar:focus-within { width: 210px; }
}
@media (max-width: 540px) {
.content { padding: 16px; }
.topbar { padding: 0 16px; }
.search-bar { display: none; }
.add-box { flex-direction: column; }
.add-btn { justify-content: center; }
.task-time { display: none; }
}
</style>

</head>
<body>

<!-- Sidebar -->

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo" style="text-decoration:none">
    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
    <span class="logo-text">Life<span>OS</span></span>
  </a>
  <nav>
    <div class="sidebar-section">Main</div>
    <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="tasks.html" class="nav-item active"><i class="fa-solid fa-circle-check"></i> Tasks</a>
    <a href="habits.html" class="nav-item"><i class="fa-solid fa-fire-flame-curved"></i> Habits</a>
    <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> Goals</a>
    <a href="calendar.html" class="nav-item"><i class="fa-regular fa-calendar"></i> Calendar</a>
    <div class="sidebar-section" style="margin-top:8px">Tools</div>
    <a href="finance.html" class="nav-item"><i class="fa-solid fa-wallet"></i> Finance</a>
    <a href="notes.html" class="nav-item"><i class="fa-regular fa-note-sticky"></i> Notes</a>
    <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">AO</div>
      <div class="user-info">
        <div class="user-name">Ait Omar</div>
        <div class="user-role">Free Plan</div>
      </div>
      <i class="fa-solid fa-ellipsis-vertical" style="color:var(--muted);font-size:.75rem"></i>
    </div>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->

<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-title">Tasks</div>
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search tasks…" oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="topbar-avatar">AO</div>
  </header>

  <!-- Content -->

  <div class="content">
    <!-- Header -->
    <div class="page-header">
      <h1>My Tasks</h1>
      <p>Manage your daily tasks and stay productive.</p>
      <div class="stat-chips">
        <div class="chip"><span class="dot" style="background:var(--blue)"></span> <span id="chipAll">0 total</span></div>
        <div class="chip"><span class="dot" style="background:var(--green)"></span> <span id="chipDone">0 done</span></div>
        <div class="chip"><span class="dot" style="background:var(--amber)"></span> <span id="chipPending">0 pending</span></div>
      </div>
    </div>

<!-- Add Task -->
<div class="add-box">
  <input type="text" class="add-input" id="taskInput" placeholder="Add a new task… (Press Enter)" maxlength="200">
  <button class="add-btn" onclick="addTask()">
    <i class="fa-solid fa-plus"></i> Add Task
  </button>
</div>

<!-- Filters + bulk -->
<div class="filters">
  <button class="filter-btn active" onclick="filterTasks('all')" data-filter="all">All</button>
  <button class="filter-btn" onclick="filterTasks('active')" data-filter="active">Active</button>
  <button class="filter-btn" onclick="filterTasks('completed')" data-filter="completed">Completed</button>
</div>

<!-- Bulk actions bar -->
<div class="bulk-bar" id="bulkBar" style="display:none">
  <span class="tasks-count" id="tasksCount"></span>
  <button class="clear-completed" onclick="clearCompleted()">
    <i class="fa-solid fa-trash-can"></i> Clear completed
  </button>
</div>

<!-- Task list -->
<div class="task-list" id="taskList"></div>

  </div>
</div>

<script>
  // ── STATE ──
  const STORAGE_KEY = 'lifeos_tasks';
  let tasks        = [];
  let currentFilter = 'all';
  let searchQuery   = '';

  // ── LOAD ──
  function loadTasks() {
    try {
      tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { tasks = []; }
  }

  // ── SAVE ──
  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // ── FORMAT TIME ──
  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  // ── ADD TASK ──
  function addTask() {
    const input = document.getElementById('taskInput');
    const text  = input.value.trim();
    if (!text) {
      input.focus();
      input.style.borderColor = 'var(--red)';
      input.style.boxShadow   = '0 0 0 3px rgba(248,113,113,0.12)';
      setTimeout(() => {
        input.style.borderColor = '';
        input.style.boxShadow   = '';
      }, 700);
      return;
    }
    const task = { id: Date.now(), text, completed: false, createdAt: Date.now() };
    tasks.unshift(task);
    saveTasks();
    input.value = '';
    // reset to "all" if on completed filter so user sees new task
    if (currentFilter === 'completed') filterTasks('all');
    else renderTasks();
  }

  // ── DELETE TASK ──
  function deleteTask(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
      }, 200);
    }
  }

  // ── TOGGLE TASK ──
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.completed = !t.completed;
    saveTasks();
    renderTasks();
  }

  // ── FILTER ──
  function filterTasks(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === type);
    });
    renderTasks();
  }

  // ── SEARCH ──
  function searchTasks(query) {
    searchQuery = query.toLowerCase();
    renderTasks();
  }

  function onSearch(val) {
    const clearBtn = document.getElementById('searchClear');
    clearBtn.classList.toggle('visible', val.length > 0);
    searchTasks(val);
  }

  function clearSearch() {
    const inp = document.getElementById('searchInput');
    inp.value = '';
    document.getElementById('searchClear').classList.remove('visible');
    searchQuery = '';
    renderTasks();
  }

  // ── CLEAR COMPLETED ──
  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    renderTasks();
  }

  // ── RENDER ──
  function renderTasks() {
    const list = document.getElementById('taskList');

    // filter by type
    let visible = tasks;
    if (currentFilter === 'active')    visible = tasks.filter(t => !t.completed);
    if (currentFilter === 'completed') visible = tasks.filter(t =>  t.completed);

    // filter by search
    if (searchQuery) {
      visible = visible.filter(t => t.text.toLowerCase().includes(searchQuery));
    }

    // update chips
    const total   = tasks.length;
    const done    = tasks.filter(t => t.completed).length;
    const pending = total - done;
    document.getElementById('chipAll').textContent     = `${total} total`;
    document.getElementById('chipDone').textContent    = `${done} done`;
    document.getElementById('chipPending').textContent = `${pending} pending`;

    // bulk bar
    const bulkBar = document.getElementById('bulkBar');
    bulkBar.style.display = total > 0 ? 'flex' : 'none';
    document.getElementById('tasksCount').innerHTML =
      `Showing <strong>${visible.length}</strong> of <strong>${total}</strong>`;

    // empty state
    if (visible.length === 0) {
      let msg = '';
      if (searchQuery)             msg = `No tasks match "<strong>${searchQuery}</strong>"`;
      else if (currentFilter === 'active')    msg = 'No active tasks — great job! 🎉';
      else if (currentFilter === 'completed') msg = 'No completed tasks yet.';
      else                                    msg = 'No tasks yet. Add your first task above!';

      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="fa-solid fa-${searchQuery ? 'magnifying-glass' : 'inbox'}"></i></div>
          <h3>${searchQuery ? 'No results' : currentFilter === 'all' ? 'All clear!' : 'Nothing here'}</h3>
          <p>${msg}</p>
        </div>`;
      return;
    }

    // render cards
    list.innerHTML = visible.map(t => `
      <div class="task-card ${t.completed ? 'done' : ''}" data-id="${t.id}">
        <div class="cb ${t.completed ? 'checked' : ''}" onclick="toggleTask(${t.id})">
          <i class="fa-solid fa-check"></i>
        </div>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <span class="task-time">${formatTime(t.createdAt)}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete task">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>
    `).join('');
  }

  // ── ESCAPE HTML ──
  function escapeHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── ENTER KEY ──
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── SIDEBAR ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // ── INIT ──
  loadTasks();
  renderTasks();
</script>
