<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS — الملاحظات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== المتغيرات الأساسية (موحّدة) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #111115;
      --surface2: #18181e;
      --surface3: #1f1f27;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.10);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --muted2: #9090a8;
      --accent: #7c6aff;
      --accent2: #5e4de8;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --sidebar-w: 240px;
      --topbar-h: 64px;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.18s cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 15px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR (موحّد) ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    .sidebar-section {
      padding: 14px 12px 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
    nav::-webkit-scrollbar { width: 4px; }
    nav::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      color: var(--muted2);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      transition: background var(--transition), color var(--transition);
      margin-bottom: 2px;
      position: relative;
    }
    .nav-item i { width: 20px; text-align: center; font-size: 0.95rem; flex-shrink: 0; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(124,106,255,0.12);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      right: -12px;
      top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    .nav-badge {
      margin-right: auto;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 999px;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 14px 12px;
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
    }
    .user-card:hover { background: var(--surface2); }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .user-role { font-size: 0.72rem; color: var(--muted); }

    /* ===== OVERLAY (mobile) ===== */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      backdrop-filter: blur(2px);
    }
    .overlay.show { display: block; }

    /* ===== MAIN ===== */
    .main {
      margin-right: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(12,12,15,0.88);
      backdrop-filter: blur(16px);
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--muted2);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .menu-btn:hover { color: var(--text); background: var(--surface2); }

    .topbar-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-date {
      font-size: 0.78rem;
      color: var(--muted);
      margin-right: 4px;
    }

    .search-bar {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      width: 220px;
      transition: border-color var(--transition), width var(--transition);
    }
    .search-bar:focus-within { border-color: var(--accent); width: 260px; }
    .search-bar i { color: var(--muted); font-size: 0.8rem; }
    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      width: 100%;
    }
    .search-bar input::placeholder { color: var(--muted); }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .notif-btn {
      position: relative;
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted2);
      font-size: 0.85rem;
      transition: color var(--transition), border-color var(--transition);
    }
    .notif-btn:hover { color: var(--text); border-color: var(--border2); }
    .notif-dot {
      position: absolute;
      top: 7px; left: 7px;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }
    .topbar-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color var(--transition);
    }
    .topbar-avatar:hover { border-color: var(--accent); }

    /* ===== CONTENT ===== */
    .content { flex: 1; padding: 28px; max-width: 1200px; }

    /* ===== NOTES LAYOUT ===== */
    .notes-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      height: calc(100vh - var(--topbar-h) - 100px);
    }

    /* ===== NOTES SIDEBAR (القائمة) ===== */
    .notes-sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .notes-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notes-header h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .new-note-btn {
      width: 32px; height: 32px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background var(--transition);
    }
    .new-note-btn:hover { background: var(--accent2); }
    
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .note-item {
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      margin-bottom: 4px;
      border: 1px solid transparent;
    }
    .note-item:hover { background: var(--surface2); }
    .note-item.active {
      background: rgba(124,106,255,0.1);
      border-color: rgba(124,106,255,0.3);
    }
    .note-item-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-item-preview {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .note-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .note-item-date {
      font-size: 0.65rem;
      color: var(--muted2);
      font-family: 'DM Mono', monospace;
    }
    .delete-note-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity var(--transition), color var(--transition);
    }
    .note-item:hover .delete-note-btn { opacity: 1; }
    .delete-note-btn:hover { color: var(--red); }

    /* ===== NOTE EDITOR ===== */
    .note-editor {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .note-title-input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 600;
      font-family: inherit;
      outline: none;
    }
    .note-title-input::placeholder { color: var(--muted); }
    
    .editor-toolbar {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .tool-btn {
      width: 32px; height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted2);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      transition: all var(--transition);
    }
    .tool-btn:hover {
      background: var(--surface3);
      color: var(--text);
      border-color: var(--border2);
    }

    .note-content-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .note-content-input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.7;
      resize: none;
      outline: none;
    }
    .note-content-input::placeholder { color: var(--muted); }

    .editor-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .save-status {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .save-status.saved { color: var(--green); }

    /* ===== EMPTY STATE ===== */
    .empty-editor {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
    .empty-editor i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); box-shadow: -24px 0 60px rgba(0,0,0,0.5); }
      .main { margin-right: 0; }
      .menu-btn { display: grid; }
      .notes-layout { grid-template-columns: 1fr; }
      .notes-sidebar { display: none; }
      .search-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar (موحّد) -->
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
    <span class="logo-text">Life<span>OS</span></span>
  </a>
  <nav>
    <div class="sidebar-section">الرئيسية</div>
    <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> لوحة التحكم</a>
    <a href="tasks.html" class="nav-item"><i class="fa-solid fa-circle-check"></i> المهام</a>
    <a href="habits.html" class="nav-item"><i class="fa-solid fa-fire-flame-curved"></i> العادات</a>
    <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> الأهداف</a>
    <a href="calendar.html" class="nav-item"><i class="fa-regular fa-calendar"></i> التقويم</a>
    <div class="sidebar-section" style="margin-top:8px">أدوات</div>
    <a href="finance.html" class="nav-item"><i class="fa-solid fa-wallet"></i> المالية</a>
    <a href="notes.html" class="nav-item active"><i class="fa-regular fa-note-sticky"></i> الملاحظات</a>
    <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">AO</div>
      <div class="user-info">
        <div class="user-name">أيت عمر</div>
        <div class="user-role">خطة مجانية</div>
      </div>
      <i class="fa-solid fa-ellipsis-vertical" style="color:var(--muted);font-size:.75rem"></i>
    </div>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main">
  <!-- Topbar موحّد -->
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div>
      <div class="topbar-title">الملاحظات</div>
      <div class="topbar-date" id="todayDate"></div>
    </div>
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="بحث في الملاحظات..." id="searchNotes" oninput="filterNotes(this.value)">
    </div>
    <div class="topbar-actions">
      <div class="notif-btn">
        <i class="fa-regular fa-bell"></i>
        <span class="notif-dot"></span>
      </div>
      <div class="topbar-avatar">AO</div>
    </div>
  </header>

  <div class="content">
    <div class="notes-layout">
      <!-- قائمة الملاحظات -->
      <div class="notes-sidebar">
        <div class="notes-header">
          <h3>ملاحظاتي</h3>
          <button class="new-note-btn" onclick="createNewNote()" title="ملاحظة جديدة">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div class="notes-list" id="notesList">
          <!-- سيتم ملؤها عبر JavaScript -->
        </div>
      </div>

      <!-- محرر الملاحظة -->
      <div class="note-editor" id="noteEditor">
        <div class="empty-editor" id="emptyEditor">
          <i class="fa-regular fa-note-sticky"></i>
          <h3>اختر ملاحظة أو أنشئ جديدة</h3>
          <p style="margin-top:8px">ابدأ بكتابة أفكارك وملاحظاتك المهمة.</p>
        </div>
        
        <div id="editorContent" style="display: none; height: 100%; display: flex; flex-direction: column;">
          <div class="editor-header">
            <input type="text" class="note-title-input" id="noteTitle" placeholder="عنوان الملاحظة" oninput="onNoteChange()">
          </div>
          <div class="editor-toolbar">
            <button class="tool-btn" onclick="formatText('bold')" title="غامق"><i class="fa-solid fa-bold"></i></button>
            <button class="tool-btn" onclick="formatText('italic')" title="مائل"><i class="fa-solid fa-italic"></i></button>
            <button class="tool-btn" onclick="formatText('underline')" title="تسطير"><i class="fa-solid fa-underline"></i></button>
            <span style="flex:1"></span>
            <button class="tool-btn" onclick="deleteCurrentNote()" title="حذف الملاحظة" style="color: var(--red)"><i class="fa-solid fa-trash-can"></i></button>
          </div>
          <div class="note-content-area">
            <textarea class="note-content-input" id="noteContent" placeholder="اكتب ملاحظتك هنا..." oninput="onNoteChange()"></textarea>
          </div>
          <div class="editor-footer">
            <span class="save-status" id="saveStatus">
              <i class="fa-regular fa-save"></i> تم الحفظ تلقائياً
            </span>
            <span style="font-size:0.7rem; color:var(--muted);" id="wordCount">0 كلمة</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- CONSTANTS ----------
    const STORAGE_KEY = 'lifeos_notes';
    
    // ---------- STATE ----------
    let notes = [];
    let activeNoteId = null;
    let searchTerm = '';
    let saveTimeout = null;

    // ---------- LOAD / SAVE ----------
    function loadNotes() {
      try {
        notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { notes = []; }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      updateSaveStatus();
    }

    // ---------- UTILS ----------
    function formatDate(timestamp) {
      const d = new Date(timestamp);
      const now = new Date();
      const diff = now - d;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      
      if (days === 0) return 'اليوم';
      if (days === 1) return 'أمس';
      if (days < 7) return `قبل ${days} أيام`;
      return d.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
    }

    function getPreview(content) {
      const plain = content.replace(/<[^>]*>/g, '').substring(0, 50);
      return plain || 'ملاحظة فارغة...';
    }

    function countWords(text) {
      const plain = text.replace(/<[^>]*>/g, '').trim();
      return plain ? plain.split(/\s+/).length : 0;
    }

    function updateSaveStatus() {
      const status = document.getElementById('saveStatus');
      if (status) {
        status.innerHTML = '<i class="fa-solid fa-check"></i> تم الحفظ';
        status.classList.add('saved');
        setTimeout(() => {
          status.innerHTML = '<i class="fa-regular fa-save"></i> تم الحفظ تلقائياً';
          status.classList.remove('saved');
        }, 1500);
      }
    }

    // ---------- RENDER NOTES LIST ----------
    function renderNotesList() {
      const container = document.getElementById('notesList');
      
      let filtered = notes;
      if (searchTerm) {
        filtered = filtered.filter(n => 
          n.title.toLowerCase().includes(searchTerm) || 
          n.content.toLowerCase().includes(searchTerm)
        );
      }

      // ترتيب حسب تاريخ التعديل (الأحدث أولاً)
      filtered.sort((a, b) => b.updatedAt - a.updatedAt);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:32px 16px; color:var(--muted);">
            <i class="fa-regular fa-note-sticky" style="font-size:2rem; margin-bottom:12px; opacity:0.5;"></i>
            <p>${searchTerm ? 'لا توجد ملاحظات تطابق البحث.' : 'لا توجد ملاحظات بعد. أنشئ ملاحظتك الأولى!'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(note => `
        <div class="note-item ${activeNoteId === note.id ? 'active' : ''}" onclick="selectNote(${note.id})">
          <div class="note-item-title">${escapeHtml(note.title || 'بدون عنوان')}</div>
          <div class="note-item-preview">${escapeHtml(getPreview(note.content))}</div>
          <div class="note-item-meta">
            <span class="note-item-date">${formatDate(note.updatedAt)}</span>
            <button class="delete-note-btn" onclick="event.stopPropagation(); deleteNote(${note.id})" title="حذف">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    // ---------- RENDER EDITOR ----------
    function renderEditor() {
      const emptyEditor = document.getElementById('emptyEditor');
      const editorContent = document.getElementById('editorContent');
      const note = notes.find(n => n.id === activeNoteId);

      if (!note) {
        emptyEditor.style.display = 'flex';
        editorContent.style.display = 'none';
        return;
      }

      emptyEditor.style.display = 'none';
      editorContent.style.display = 'flex';

      document.getElementById('noteTitle').value = note.title || '';
      document.getElementById('noteContent').value = note.content || '';
      updateWordCount();
    }

    function updateWordCount() {
      const content = document.getElementById('noteContent').value;
      const count = countWords(content);
      document.getElementById('wordCount').textContent = `${count} كلمة`;
    }

    // ---------- NOTE ACTIONS ----------
    window.createNewNote = function() {
      const newNote = {
        id: Date.now(),
        title: '',
        content: '',
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      notes.push(newNote);
      activeNoteId = newNote.id;
      saveNotes();
      renderNotesList();
      renderEditor();
      document.getElementById('noteTitle').focus();
    };

    window.selectNote = function(id) {
      activeNoteId = id;
      renderNotesList();
      renderEditor();
    };

    window.deleteNote = function(id) {
      notes = notes.filter(n => n.id !== id);
      if (activeNoteId === id) {
        activeNoteId = notes.length > 0 ? notes[0].id : null;
      }
      saveNotes();
      renderNotesList();
      renderEditor();
    };

    window.deleteCurrentNote = function() {
      if (activeNoteId) {
        deleteNote(activeNoteId);
      }
    };

    window.onNoteChange = function() {
      const note = notes.find(n => n.id === activeNoteId);
      if (!note) return;

      const titleInput = document.getElementById('noteTitle');
      const contentInput = document.getElementById('noteContent');
      
      note.title = titleInput.value;
      note.content = contentInput.value;
      note.updatedAt = Date.now();

      updateWordCount();

      // Debounce save
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveNotes();
        renderNotesList(); // تحديث المعاينة في القائمة
      }, 500);
    };

    window.filterNotes = function(term) {
      searchTerm = term.toLowerCase();
      renderNotesList();
    };

    // ---------- TEXT FORMATTING ----------
    window.formatText = function(command) {
      const textarea = document.getElementById('noteContent');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selectedText = textarea.value.substring(start, end);
      
      let formattedText = '';
      let cursorOffset = 0;
      
      switch(command) {
        case 'bold':
          formattedText = `**${selectedText}**`;
          cursorOffset = 2;
          break;
        case 'italic':
          formattedText = `*${selectedText}*`;
          cursorOffset = 1;
          break;
        case 'underline':
          formattedText = `__${selectedText}__`;
          cursorOffset = 2;
          break;
      }
      
      if (selectedText) {
        textarea.value = textarea.value.substring(0, start) + formattedText + textarea.value.substring(end);
        textarea.selectionStart = start + cursorOffset;
        textarea.selectionEnd = start + cursorOffset + selectedText.length;
      }
      
      textarea.focus();
      onNoteChange();
    };

    // ---------- HELPER ----------
    function escapeHtml(text) {
      return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ---------- SIDEBAR ----------
    window.toggleSidebar = function() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    };
    window.closeSidebar = function() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    };

    // ---------- DATE IN TOPBAR ----------
    function displayTopbarDate() {
      const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
      const now = new Date();
      document.getElementById('todayDate').textContent = now.toLocaleDateString('ar-EG', opts);
    }

    // ---------- INIT ----------
    loadNotes();
    if (notes.length > 0 && !activeNoteId) {
      activeNoteId = notes[0].id;
    }
    renderNotesList();
    renderEditor();
    displayTopbarDate();
  })();
</script>
</body>
</html>
