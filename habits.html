<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS — العادات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== المتغيرات الأساسية (موحّدة) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #111115;
      --surface2: #18181e;
      --surface3: #1f1f27;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.10);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --muted2: #9090a8;
      --accent: #7c6aff;
      --accent2: #5e4de8;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --sidebar-w: 240px;
      --topbar-h: 64px;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.18s cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 15px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR (موحّد) ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; right: 0;
      height: 100vh;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    .sidebar-section {
      padding: 14px 12px 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    nav { flex: 1; overflow-y: auto; padding: 8px 12px; }
    nav::-webkit-scrollbar { width: 4px; }
    nav::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      color: var(--muted2);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      transition: background var(--transition), color var(--transition);
      margin-bottom: 2px;
      position: relative;
    }
    .nav-item i { width: 20px; text-align: center; font-size: 0.95rem; flex-shrink: 0; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(124,106,255,0.12);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      right: -12px;
      top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    .nav-badge {
      margin-right: auto;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 999px;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 14px 12px;
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
    }
    .user-card:hover { background: var(--surface2); }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .user-role { font-size: 0.72rem; color: var(--muted); }

    /* ===== OVERLAY (mobile) ===== */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      backdrop-filter: blur(2px);
    }
    .overlay.show { display: block; }

    /* ===== MAIN ===== */
    .main {
      margin-right: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(12,12,15,0.88);
      backdrop-filter: blur(16px);
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--muted2);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .menu-btn:hover { color: var(--text); background: var(--surface2); }

    .topbar-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-date {
      font-size: 0.78rem;
      color: var(--muted);
      margin-right: 4px;
    }

    .search-bar {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      width: 220px;
      transition: border-color var(--transition), width var(--transition);
    }
    .search-bar:focus-within { border-color: var(--accent); width: 260px; }
    .search-bar i { color: var(--muted); font-size: 0.8rem; }
    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      width: 100%;
    }
    .search-bar input::placeholder { color: var(--muted); }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .notif-btn {
      position: relative;
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted2);
      font-size: 0.85rem;
      transition: color var(--transition), border-color var(--transition);
    }
    .notif-btn:hover { color: var(--text); border-color: var(--border2); }
    .notif-dot {
      position: absolute;
      top: 7px; left: 7px;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }
    .topbar-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color var(--transition);
    }
    .topbar-avatar:hover { border-color: var(--accent); }

    /* ===== CONTENT ===== */
    .content { flex: 1; padding: 28px; max-width: 900px; }

    /* ===== PAGE HEADER ===== */
    .page-header { margin-bottom: 24px; }
    .page-header h1 {
      font-size: 1.5rem; font-weight: 600;
      letter-spacing: -0.4px; margin-bottom: 4px;
    }
    .page-header p { font-size: 0.85rem; color: var(--muted2); }
    .stat-chips { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 4px 12px;
      font-size: 0.75rem; color: var(--muted2);
      font-family: 'DM Mono', monospace;
    }
    .chip .dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ===== ADD HABIT ===== */
    .add-box { display: flex; gap: 10px; margin-bottom: 28px; }
    .add-input {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      padding: 11px 16px; color: var(--text);
      font-family: inherit; font-size: 0.9rem; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,0.12); }
    .add-input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
    .add-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    .add-btn:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(124,106,255,0.3); }
    .add-btn:active { transform: scale(0.97); }

    /* ===== TODAY'S PROGRESS BAR ===== */
    .today-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .today-bar-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(251,191,36,0.12); color: var(--amber);
      display: grid; place-items: center; font-size: 1rem; flex-shrink: 0;
    }
    .today-bar-info { flex: 1; min-width: 0; }
    .today-bar-label { font-size: 0.78rem; color: var(--muted2); margin-bottom: 6px; }
    .progress-track {
      height: 6px; background: var(--surface3); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--amber), #fde68a);
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .today-bar-pct {
      font-size: 1.1rem; font-weight: 600;
      font-family: 'DM Mono', monospace; color: var(--amber);
      flex-shrink: 0;
    }

    /* ===== HABITS GRID ===== */
    .habits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    /* ===== HABIT CARD ===== */
    .habit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex; flex-direction: column; gap: 14px;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      animation: fadeUp 0.22s var(--transition) both;
      position: relative; overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .habit-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
    .habit-card.done-today { border-color: rgba(52,211,153,0.25); }
    .habit-card.done-today::before {
      content: ''; position: absolute; top: 0; right: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--green), #6ee7b7);
    }
    .habit-card.removing { animation: fadeOut 0.2s var(--transition) forwards; }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.95); }
    }

    .habit-top { display: flex; align-items: flex-start; gap: 10px; }
    .habit-color-dot {
      width: 10px; height: 10px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }
    .habit-name {
      flex: 1; font-size: 0.95rem; font-weight: 500;
      color: var(--text); line-height: 1.3; word-break: break-word;
    }
    .del-btn {
      width: 28px; height: 28px; background: none;
      border: 1px solid transparent; border-radius: 6px;
      color: var(--muted); font-size: 0.75rem; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .del-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.25); color: var(--red); }

    /* Streak */
    .streak-row { display: flex; align-items: center; gap: 8px; }
    .streak-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.75rem; font-weight: 600;
      font-family: 'DM Mono', monospace;
      background: rgba(251,191,36,0.10); color: var(--amber);
      border: 1px solid rgba(251,191,36,0.2);
    }
    .streak-badge.zero { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .streak-best {
      font-size: 0.72rem; color: var(--muted);
    }

    /* Week dots */
    .week-dots { display: flex; gap: 5px; }
    .week-dot {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 0.58rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .week-dot.filled { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.3); color: var(--green); }
    .week-dot.today-dot { border-color: var(--accent); }
    .week-dot .day-label { font-size: 0.55rem; text-transform: uppercase; color: var(--muted); }

    /* Mark button */
    .mark-btn {
      width: 100%; padding: 9px;
      border-radius: var(--radius-sm); border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text);
      font-family: inherit; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
    }
    .mark-btn:hover:not(:disabled) {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.35);
      color: var(--green);
    }
    .mark-btn:active:not(:disabled) { transform: scale(0.97); }
    .mark-btn:disabled {
      cursor: default; opacity: 0.7;
      background: rgba(52,211,153,0.08);
      border-color: rgba(52,211,153,0.2);
      color: var(--green);
    }
    .mark-btn.pulse { animation: pulse 0.35s ease; }
    @keyframes pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 72px 20px; text-align: center; gap: 12px;
      grid-column: 1 / -1;
    }
    .empty-icon {
      width: 64px; height: 64px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 16px;
      display: grid; place-items: center;
      font-size: 1.4rem; color: var(--muted); margin-bottom: 4px;
    }
    .empty-state h3 { font-size: 1rem; font-weight: 600; }
    .empty-state p { font-size: 0.83rem; color: var(--muted); max-width: 260px; line-height: 1.5; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); box-shadow: -24px 0 60px rgba(0,0,0,0.5); }
      .main { margin-right: 0; }
      .menu-btn { display: grid; }
      .search-bar { width: 160px; }
      .search-bar:focus-within { width: 190px; }
    }
    @media (max-width: 540px) {
      .content { padding: 16px; }
      .topbar { padding: 0 16px; }
      .add-box { flex-direction: column; }
      .add-btn { justify-content: center; }
      .habits-grid { grid-template-columns: 1fr; }
      .search-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar (موحّد) -->
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
    <span class="logo-text">Life<span>OS</span></span>
  </a>
  <nav>
    <div class="sidebar-section">الرئيسية</div>
    <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> لوحة التحكم</a>
    <a href="tasks.html" class="nav-item"><i class="fa-solid fa-circle-check"></i> المهام</a>
    <a href="habits.html" class="nav-item active"><i class="fa-solid fa-fire-flame-curved"></i> العادات</a>
    <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> الأهداف</a>
    <a href="calendar.html" class="nav-item"><i class="fa-regular fa-calendar"></i> التقويم</a>
    <div class="sidebar-section" style="margin-top:8px">أدوات</div>
    <a href="finance.html" class="nav-item"><i class="fa-solid fa-wallet"></i> المالية</a>
    <a href="notes.html" class="nav-item"><i class="fa-regular fa-note-sticky"></i> الملاحظات</a>
    <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> الإعدادات</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">AO</div>
      <div class="user-info">
        <div class="user-name">أيت عمر</div>
        <div class="user-role">خطة مجانية</div>
      </div>
      <i class="fa-solid fa-ellipsis-vertical" style="color:var(--muted);font-size:.75rem"></i>
    </div>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div>
      <div class="topbar-title">العادات</div>
      <div class="topbar-date" id="todayDate"></div>
    </div>
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="بحث..." disabled>
    </div>
    <div class="topbar-actions">
      <div class="notif-btn">
        <i class="fa-regular fa-bell"></i>
        <span class="notif-dot"></span>
      </div>
      <div class="topbar-avatar">AO</div>
    </div>
  </header>

  <div class="content">
    <!-- Page Header -->
    <div class="page-header">
      <h1>العادات اليومية</h1>
      <p>ابنِ الانضباط يوماً بعد يوم.</p>
      <div class="stat-chips">
        <div class="chip"><span class="dot" style="background:var(--accent)"></span><span id="chipTotal">0 عادة</span></div>
        <div class="chip"><span class="dot" style="background:var(--green)"></span><span id="chipDone">0 مكتملة اليوم</span></div>
        <div class="chip"><span class="dot" style="background:var(--amber)"></span><span id="chipBest">أفضل سلسلة: 0</span></div>
      </div>
    </div>

    <!-- Add Habit -->
    <div class="add-box">
      <input type="text" class="add-input" id="habitInput" placeholder="أضف عادة جديدة… (مثال: صلاة الفجر)" maxlength="100">
      <button class="add-btn" onclick="addHabit()">
        <i class="fa-solid fa-plus"></i> إضافة عادة
      </button>
    </div>

    <!-- Today's Progress -->
    <div class="today-bar" id="todayBar" style="display:none">
      <div class="today-bar-icon"><i class="fa-solid fa-fire"></i></div>
      <div class="today-bar-info">
        <div class="today-bar-label" id="progressLabel">تقدم اليوم</div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="today-bar-pct" id="progressPct">0%</div>
    </div>

    <!-- Habits Grid -->
    <div class="habits-grid" id="habitsGrid"></div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- CONSTANTS ----------
    const STORAGE_KEY = 'lifeos_habits';
    const COLORS = ['#7c6aff','#34d399','#60a5fa','#fbbf24','#f87171','#a78bfa','#fb923c','#38bdf8'];
    const DAYS_AR = ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

    // ---------- STATE ----------
    let habits = [];

    // ---------- TODAY ----------
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function weekDates() {
      const today = new Date();
      const day = today.getDay(); // 0=Sun
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - day + i);
        dates.push({
          str: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
          label: DAYS_AR[i].substring(0,1), // أول حرف
          num: d.getDate(),
          isToday: i === day
        });
      }
      return dates;
    }

    // ---------- LOAD / SAVE ----------
    function loadHabits() {
      try { habits = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { habits = []; }
    }
    function saveHabits() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    }

    // ---------- CALCULATE STREAK ----------
    function calculateStreak(habit) {
      if (!habit.dates || habit.dates.length === 0) return 0;
      const sorted = [...habit.dates].sort().reverse(); // الأحدث أولاً
      let streak = 0;
      let cursor = new Date();

      // إذا لم يتم الإنجاز اليوم، نبدأ التحقق من الأمس
      if (sorted[0] !== todayStr()) {
        cursor.setDate(cursor.getDate() - 1);
      }

      for (let i = 0; i < sorted.length; i++) {
        const expected = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
        if (sorted[i] === expected) {
          streak++;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    }

    function bestStreak(habit) {
      if (!habit.dates || habit.dates.length === 0) return 0;
      const sorted = [...habit.dates].sort();
      let best = 1, cur = 1;
      for (let i = 1; i < sorted.length; i++) {
        const prev = new Date(sorted[i-1]);
        const curr = new Date(sorted[i]);
        const diff = (curr - prev) / 86400000;
        if (diff === 1) { cur++; best = Math.max(best, cur); }
        else cur = 1;
      }
      return best;
    }

    // ---------- ADD HABIT ----------
    window.addHabit = function() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) {
        input.classList.add('error');
        input.focus();
        setTimeout(() => input.classList.remove('error'), 700);
        return;
      }
      const color = COLORS[habits.length % COLORS.length];
      const habit = { id: Date.now(), name, color, dates: [], streak: 0 };
      habits.unshift(habit);
      saveHabits();
      input.value = '';
      renderHabits();
    };

    // ---------- DELETE HABIT ----------
    window.deleteHabit = function(id) {
      const card = document.querySelector(`.habit-card[data-id="${id}"]`);
      if (card) {
        card.classList.add('removing');
        setTimeout(() => {
          habits = habits.filter(h => h.id !== id);
          saveHabits();
          renderHabits();
        }, 200);
      }
    };

    // ---------- MARK DONE ----------
    window.markHabitDone = function(id) {
      const habit = habits.find(h => h.id === id);
      if (!habit) return;
      const today = todayStr();
      if (habit.dates.includes(today)) return; // مكتملة بالفعل
      habit.dates.push(today);
      habit.streak = calculateStreak(habit);
      saveHabits();

      const btn = document.querySelector(`.habit-card[data-id="${id}"] .mark-btn`);
      if (btn) btn.classList.add('pulse');
      setTimeout(renderHabits, 350);
    };

    // ---------- ESCAPE HTML ----------
    function escHtml(str) {
      return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // ---------- RENDER ----------
    function renderHabits() {
      const grid = document.getElementById('habitsGrid');
      const today = todayStr();
      const week = weekDates();
      const total = habits.length;
      const doneToday = habits.filter(h => h.dates.includes(today)).length;
      const allBest = habits.reduce((m, h) => Math.max(m, bestStreak(h)), 0);
      const pct = total > 0 ? Math.round((doneToday / total) * 100) : 0;

      // تحديث الرقائق
      document.getElementById('chipTotal').textContent = `${total} ${total === 1 ? 'عادة' : 'عادة'}`;
      document.getElementById('chipDone').textContent = `${doneToday} مكتملة اليوم`;
      document.getElementById('chipBest').textContent = `أفضل سلسلة: ${allBest}`;

      // شريط التقدم
      const bar = document.getElementById('todayBar');
      bar.style.display = total > 0 ? 'flex' : 'none';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';
      
      let progressLabelText = '';
      if (pct === 100) progressLabelText = '🎉 كل العادات مكتملة اليوم!';
      else if (pct === 0) progressLabelText = 'ابدأ يومك — سجّل أول عادة!';
      else progressLabelText = `${doneToday} من ${total} عادات مكتملة`;
      document.getElementById('progressLabel').textContent = progressLabelText;

      // تاريخ الـ Topbar
      const now = new Date();
      document.getElementById('todayDate').textContent = now.toLocaleDateString('ar-EG', { weekday:'long', day:'numeric', month:'long' });

      if (total === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fa-solid fa-fire-flame-curved"></i></div>
            <h3>لا توجد عادات بعد</h3>
            <p>أضف عادتك الأولى أعلاه وابدأ ببناء روتينك اليومي.</p>
          </div>`;
        return;
      }

      grid.innerHTML = habits.map(h => {
        const doneT = h.dates.includes(today);
        const streak = calculateStreak(h);
        const best = bestStreak(h);

        const dotsHtml = week.map(w => `
          <div class="week-dot ${h.dates.includes(w.str) ? 'filled' : ''} ${w.isToday ? 'today-dot' : ''}">
            <span class="day-label">${w.label}</span>
            ${h.dates.includes(w.str) ? '<i class="fa-solid fa-check" style="font-size:.55rem"></i>' : `<span>${w.num}</span>`}
          </div>
        `).join('');

        return `
          <div class="habit-card ${doneT ? 'done-today' : ''}" data-id="${h.id}">
            <div class="habit-top">
              <div class="habit-color-dot" style="background:${h.color}"></div>
              <span class="habit-name">${escHtml(h.name)}</span>
              <button class="del-btn" onclick="deleteHabit(${h.id})" title="حذف العادة">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>

            <div class="streak-row">
              <div class="streak-badge ${streak === 0 ? 'zero' : ''}">
                <i class="fa-solid fa-fire" style="font-size:.7rem"></i> ${streak} يوم
              </div>
              ${best > 0 ? `<span class="streak-best">الأفضل: ${best}</span>` : ''}
            </div>

            <div class="week-dots">${dotsHtml}</div>

            <button class="mark-btn" onclick="markHabitDone(${h.id})" ${doneT ? 'disabled' : ''}>
              ${doneT
                ? '<i class="fa-solid fa-circle-check"></i> مكتملة اليوم'
                : '<i class="fa-regular fa-circle-check"></i> تسجيل الإنجاز'}
            </button>
          </div>`;
      }).join('');
    }

    // ---------- ENTER KEY ----------
    document.getElementById('habitInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addHabit();
    });

    // ---------- SIDEBAR ----------
    window.toggleSidebar = function() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    };
    window.closeSidebar = function() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    };

    // ---------- INIT ----------
    loadHabits();
    renderHabits();
  })();
</script>
</body>
</html>
